version: "3.9"

services:
  egroupware-tools:
    build: .
    container_name: egroupware-openapi-tools
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # --- Set your EGroupware credentials here ---
      EGW_BASE_URL: ${EGW_BASE_URL:-https://your-egroupware.example.org/egroupware}
      # Token auth (recommended):
      EGW_TOKEN: ${EGW_TOKEN:-}
      # Basic auth (alternative):
      EGW_USERNAME: ${EGW_USERNAME:-}
      EGW_PASSWORD: ${EGW_PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
